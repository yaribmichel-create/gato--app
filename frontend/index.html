<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gato Royale</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Lilita One', cursive; text-align: center; background: radial-gradient(circle, #2a5298, #1e3c72); color: white; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center;}
        h1 { font-size: 3.5em; margin-bottom: 10px; color: #FFD700; text-shadow: 0px 4px 0px #b8860b, 0px -2px 0px #000, 2px 0px 0px #000, -2px 0px 0px #000; letter-spacing: 2px;}
        .pantalla { display: none; width: 100%; max-width: 400px; }
        .activa { display: block; }
        .panel { background-color: #f4e8c1; border: 4px solid #3e2723; border-radius: 16px; padding: 20px; box-shadow: 0px 8px 0px #3e2723; color: #3e2723; margin-bottom: 20px;}
        
        input { width: 80%; padding: 12px; font-size: 1.2em; font-family: 'Lilita One', cursive; border: 3px solid #3e2723; border-radius: 10px; margin-bottom: 15px; text-align: center;}
        
        /* Botones estilo Royale */
        .btn-entrar { background-color: #4CAF50; color: white; padding: 12px 20px; font-size: 1.2em; font-family: 'Lilita One', cursive; border: 3px solid #1b5e20; border-radius: 12px; box-shadow: 0px 6px 0px #1b5e20; cursor: pointer; text-transform: uppercase; transition: 0.1s all; width: 45%;}
        .btn-entrar:active { transform: translateY(6px); box-shadow: 0px 0px 0px #1b5e20;}
        
        .btn-registro { background-color: #2196F3; color: white; padding: 12px 20px; font-size: 1.2em; font-family: 'Lilita One', cursive; border: 3px solid #0d47a1; border-radius: 12px; box-shadow: 0px 6px 0px #0d47a1; cursor: pointer; text-transform: uppercase; transition: 0.1s all; width: 45%;}
        .btn-registro:active { transform: translateY(6px); box-shadow: 0px 0px 0px #0d47a1;}

        .botones-container { display: flex; justify-content: space-around; width: 90%; margin: 0 auto; }

        #tablero { display: grid; grid-template-columns: repeat(3, 100px); gap: 12px; justify-content: center; background-color: #3e2723; padding: 15px; border-radius: 16px; margin: 20px auto; width: max-content; box-shadow: 0px 10px 0px #1d110f;}
        .casilla { width: 100px; height: 100px; background-color: #eceff1; border: 4px solid #90a4ae; border-radius: 12px; box-shadow: 0px 6px 0px #90a4ae; font-size: 4.5em; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.1s;}
        .casilla:active { transform: translateY(6px); box-shadow: 0px 0px 0px #90a4ae;}
        .rey-azul { color: #1976D2; text-shadow: 0px 4px 0px #0d47a1; }
        .rey-rojo { color: #D32F2F; text-shadow: 0px 4px 0px #b71c1c; }
        #info { font-size: 1.3em; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 10px; margin-bottom: 10px;}
        .vs-text { font-size: 1.5em; color: #FFD700; text-shadow: 2px 2px 0px #000; margin: 10px 0;}
    </style>
</head>
<body>
    <h1>GATO ROYALE</h1>

    <div id="pantalla-login" class="pantalla activa panel">
        <h2>⚔️ Entra a la Arena ⚔️</h2>
        <input type="text" id="nombre-usuario" placeholder="Tu usuario..." autocomplete="off">
        <input type="password" id="password-usuario" placeholder="Contraseña...">
        
        <div class="botones-container">
            <button class="btn-registro" onclick="registrar()">Registrar</button>
            <button class="btn-entrar" onclick="ingresar()">Ingresar</button>
        </div>
    </div>

    <div id="pantalla-juego" class="pantalla">
        <div class="panel">
            <div style="font-size: 1.2em;">👑 Rey: <span id="perfil-nombre" style="color:#1976D2;"></span></div>
            <div style="font-size: 1.2em;">🏆 Copas (Victorias): <span id="perfil-victorias" style="color:#D32F2F;"></span></div>
        </div>
        
        <div class="vs-text">💥 <span id="oponente-nombre">Esperando rival...</span> 💥</div>
        <div id="info">Conectando al servidor...</div>
        <div id="tablero"></div>
    </div>

    <script>
        let miJugador = "";
        let ws;
        let nombreOponente = "Desconocido"; 
        let miNombreReal = "";
        
        const tableroDiv = document.getElementById("tablero");
        const infoDiv = document.getElementById("info");

        for (let i = 0; i < 9; i++) {
            let casilla = document.createElement("div");
            casilla.className = "casilla";
            casilla.id = "c" + i;
            casilla.onclick = () => hacerMovimiento(i);
            tableroDiv.appendChild(casilla);
        }

        async function registrar() {
            const nombre = document.getElementById("nombre-usuario").value;
            const contrasena = document.getElementById("password-usuario").value;
            if(!nombre || !contrasena) return alert("¡Necesitas nombre y contraseña!");

            const respuesta = await fetch(`/registro?nombre=${nombre}&contrasena=${contrasena}`, { method: 'POST' });
            const datos = await respuesta.json();
            
            if (datos.error) {
                alert("❌ " + datos.error);
            } else {
                alert("✅ " + datos.mensaje);
            }
        }

        async function ingresar() {
            const nombre = document.getElementById("nombre-usuario").value;
            const contrasena = document.getElementById("password-usuario").value;
            if(!nombre || !contrasena) return alert("¡Faltan datos!");

            const respuesta = await fetch(`/login?nombre=${nombre}&contrasena=${contrasena}`, { method: 'POST' });
            const datosPerfil = await respuesta.json();

            if (datosPerfil.error) {
                alert("🚫 " + datosPerfil.error);
            } else {
                // ¡AQUÍ GUARDAMOS LA IDENTIDAD EXACTA PARA NO PERDERLA!
                miNombreReal = datosPerfil.nombre; 
                
                document.getElementById("perfil-nombre").innerText = datosPerfil.nombre.toUpperCase();
                document.getElementById("perfil-victorias").innerText = datosPerfil.victorias;
                document.getElementById("pantalla-login").classList.remove("activa");
                document.getElementById("pantalla-juego").classList.add("activa");
                iniciarJuego();
            }
        }

        function iniciarJuego() {
            // Ahora mandamos al WebSocket nuestra identidad exacta
            ws = new WebSocket(`ws://${window.location.host}/ws/${miNombreReal}`);
            
            ws.onmessage = function(event) {
                const data = JSON.parse(event.data);
                if (data.tipo === "inicio") { miJugador = data.jugador; }

                if (data.tipo === "actualizacion_nombres") {
                    if (miJugador === "X") nombreOponente = data.nombres["O"];
                    if (miJugador === "O") nombreOponente = data.nombres["X"];
                    document.getElementById("oponente-nombre").innerText = nombreOponente.toUpperCase();
                }

                for (let i = 0; i < 9; i++) {
                    if(data.tablero) {
                        const celda = document.getElementById("c" + i);
                        const marca = data.tablero[i];
                        celda.innerText = marca;
                        celda.className = "casilla " + (marca === "X" ? "rey-azul" : (marca === "O" ? "rey-rojo" : ""));
                    }
                }

                if (data.tipo === "fin_juego") {
                    setTimeout(async () => {
                        if (data.ganador === "Empate") {
                            alert("🛡️ ¡Ha sido un empate! 🛡️");
                        } else {
                            alert(`👑 ¡Victoria para ${data.ganador}! 👑`);
                            if (miJugador === data.ganador) {
                                // ¡AQUÍ ESTÁ LA MAGIA! Mandamos los nombres EXACTOS como los tiene el servidor
                                const respuesta = await fetch(`/registrar_partida?nombre_ganador=${miNombreReal}&nombre_perdedor=${nombreOponente}`, { method: 'POST' });
                                const info = await respuesta.json();
                                
                                // Un pequeño escudo protector por si acaso
                                if(info.victorias !== undefined) {
                                    document.getElementById("perfil-victorias").innerText = info.victorias;
                                }
                            }
                        }
                        for (let i = 0; i < 9; i++) {
                            const celda = document.getElementById("c" + i);
                            celda.innerText = "";
                            celda.className = "casilla";
                        }
                        document.getElementById("info").innerText = "¡Nueva Batalla! Turno de: X";
                    }, 200); 
                } else if (data.tipo === "actualizacion" || data.tipo === "inicio") {
                    document.getElementById("info").innerText = miJugador === "Espectador" 
                        ? `👀 Eres espectador. Turno de: ${data.turno}` 
                        : `Juegas con: ${miJugador} | Turno de: ${data.turno}`;
                }
            };
        }

        function hacerMovimiento(indice) {
            if (ws && (miJugador === "X" || miJugador === "O")) {
                ws.send(JSON.stringify({ accion: "mover", indice: indice, jugador: miJugador }));
            }
        }
    </script>
</body>
</html>
